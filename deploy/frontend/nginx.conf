server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA history fallback: any non-file route serves index.html so client
    # routing (React Router) works on refresh/deep links.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend container. The /api prefix is stripped
    # so the backend sees its real paths (/auth, /requests, ...). The
    # frontend was built with VITE_API_BASE_URL=/api so all calls land here.
    location /api/ {
        proxy_pass http://backend:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Document downloads can be large-ish; don't buffer indefinitely.
        proxy_buffering off;
    }
}
